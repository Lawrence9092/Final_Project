<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Currency Exchange App</title>
    <link rel="stylesheet" href="css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Audiowide&family=Orbitron&display=swap" rel="stylesheet">

</head>
<body>
    <header>
        <h1>Currency Exchange</h1>
    </header>

    <main>
    <section class="converter">
        <h2>Convert Currency</h2>

        <form id="currencyForm">
            
            <input type="number" id="amount" placeholder="Enter amount" min="0" step="any">

            <select id="fromCurrency">
                <option value="USD">USD</option>
            </select>

            <select id="toCurrency">
                <option value="EUR">EUR</option>
                <option value="GBP">GBP</option>
                <option value="JPY">JPY</option>        
            </select>
            <button type="submit">Convert</button>
        </form>
    </section>

    <section id="result">

        <h3>Results</h3>
        <p id="conversionResult">Waiting for conversion</p>
        <script type="module" src="js/main.js"></script>
    </section>
    </main>
    
</body>
</html>
